<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Reflection Engine Client</title>
    <style>
        :root {
            --bg: #0b1020;
            --panel: #121933;
            --panel-2: #1a2244;
            --text: #e8ecff;
            --muted: #aab3d9;
            --accent: #6ea8fe;
            --border: #2a3566;
            --ok: #63d297;
            --err: #ff7a7a;
            --warn: #ffd166;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: linear-gradient(180deg, #0b1020 0%, #0f1730 100%);
            color: var(--text);
        }

        .wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        h1, h2, h3 {
            margin: 0 0 12px;
        }

        p {
            color: var(--muted);
        }

        .grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            align-items: start;
        }

        .card {
            background: rgba(18, 25, 51, 0.95);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        .stack {
            display: grid;
            gap: 12px;
        }

        label {
            display: block;
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        input, textarea, select, button {
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--panel-2);
            color: var(--text);
            padding: 10px 12px;
            font: inherit;
        }

        textarea {
            min-height: 84px;
            resize: vertical;
        }

        button {
            cursor: pointer;
            background: var(--accent);
            color: #09101e;
            font-weight: 700;
            border: none;
        }

        button.secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .method-list {
            display: grid;
            gap: 10px;
            max-height: 60vh;
            overflow: auto;
            padding-right: 4px;
        }

        .method-item {
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px;
            background: #101735;
            cursor: pointer;
        }

        .method-item.active {
            border-color: var(--accent);
            outline: 2px solid rgba(110, 168, 254, 0.25);
        }

        .method-name {
            font-weight: 700;
            margin-bottom: 4px;
        }

        .method-id {
            font-size: 12px;
            color: var(--muted);
            word-break: break-all;
        }

        .muted {
            color: var(--muted);
        }

        .pill {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 999px;
            background: #18214a;
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 12px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 120px;
            gap: 10px;
            align-items: end;
        }

        .result {
            white-space: pre-wrap;
            word-break: break-word;
            background: #0c1228;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            min-height: 88px;
        }

        .status.ok {
            color: var(--ok);
        }

        .status.err {
            color: var(--err);
        }

        .status.warn {
            color: var(--warn);
        }

        .small {
            font-size: 12px;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .method-list {
                max-height: none;
            }
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="stack" style="margin-bottom: 20px;">
        <h1>Reflection Engine Web Client</h1>
        <p>Browse exposed methods, fill in argument values, and invoke them against your HTTP server.</p>
    </div>

    <div class="grid">
        <section class="card stack">
            <h2>Connection</h2>

            <div>
                <label for="baseUrl">Base URL</label>
                <input id="baseUrl" value="http://localhost:8080"/>
            </div>

            <div>
                <label for="className">Class name</label>
                <input id="className" value="au.clef.app.demo.model.AcmeService"/>
            </div>

            <div class="row">
                <div>
                    <label for="targetId">Target ID (instance methods)</label>
                    <input id="targetId" value="acmeService"/>
                </div>
                <button id="loadBtn">Load Methods</button>
            </div>

            <div>
                <span class="status muted" id="status">Not connected.</span>
            </div>

            <div class="stack">
                <h3>Methods</h3>
                <div class="method-list" id="methodList"></div>
            </div>
        </section>

        <section class="card stack">
            <h2>Invoke</h2>

            <div class="muted" id="selectedMeta">No method selected.</div>

            <div class="stack" id="argsForm"></div>

            <div class="row">
                <button disabled id="invokeBtn">Invoke</button>
                <button class="secondary" disabled id="sampleBtn">Fill Sample</button>
            </div>

            <div class="stack">
                <h3>Request Preview</h3>
                <div class="result small" id="requestPreview"></div>
            </div>

            <div class="stack">
                <h3>Response</h3>
                <div class="result" id="responseBox"></div>
            </div>
        </section>
    </div>
</div>

<script>
    const state = {
        methods: [],
        selected: null,
    };

    const el = {
        baseUrl: document.getElementById('baseUrl'),
        className: document.getElementById('className'),
        targetId: document.getElementById('targetId'),
        loadBtn: document.getElementById('loadBtn'),
        methodList: document.getElementById('methodList'),
        selectedMeta: document.getElementById('selectedMeta'),
        argsForm: document.getElementById('argsForm'),
        invokeBtn: document.getElementById('invokeBtn'),
        sampleBtn: document.getElementById('sampleBtn'),
        requestPreview: document.getElementById('requestPreview'),
        responseBox: document.getElementById('responseBox'),
        status: document.getElementById('status'),
    };

    function setStatus(text, cls = 'muted') {
        el.status.className = `status ${cls}`;
        el.status.textContent = text;
    }

    function clearNode(node) {
        while (node.firstChild) node.removeChild(node.firstChild);
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function shortType(typeName) {
        if (!typeName) return '';
        const parts = typeName.split('.');
        return parts[parts.length - 1];
    }

    function renderMethods() {
        clearNode(el.methodList);

        if (!state.methods.length) {
            el.methodList.innerHTML = '<div class="muted">No methods loaded.</div>';
            return;
        }

        state.methods.forEach((method) => {
            const item = document.createElement('div');
            item.className = 'method-item' + (state.selected?.id === method.id ? ' active' : '');
            item.innerHTML = `
          <div class="method-name">${escapeHtml(method.displayName || method.name)}</div>
          <div class="muted small">${method.parameters.map(p => shortType(p.type)).join(', ')} → ${escapeHtml(shortType(method.returnType))}</div>
          <div style="margin-top:6px;"><span class="pill">${method.isStatic ? 'static' : 'instance'}</span></div>
          <div class="method-id" style="margin-top:8px;">${escapeHtml(method.id)}</div>
        `;
            item.onclick = () => {
                state.selected = method;
                renderMethods();
                renderSelectedMethod();
            };
            el.methodList.appendChild(item);
        });
    }

    function defaultValueForParam(param) {
        const t = (param.type || '').toLowerCase();
        if (t.endsWith('int') || t.endsWith('integer') || t.endsWith('long') || t.endsWith('double') || t.endsWith('float') || t.endsWith('short') || t.endsWith('byte')) {
            return '0';
        }
        if (t.endsWith('boolean')) return 'true';
        if (t.endsWith('char')) return 'A';
        return '';
    }

    function renderSelectedMethod() {
        clearNode(el.argsForm);
        el.responseBox.textContent = '';

        if (!state.selected) {
            el.selectedMeta.textContent = 'No method selected.';
            el.requestPreview.textContent = '';
            el.invokeBtn.disabled = true;
            el.sampleBtn.disabled = true;
            return;
        }

        const method = state.selected;
        el.selectedMeta.innerHTML = `
        <div><strong>${escapeHtml(method.displayName || method.name)}</strong></div>
        <div class="small muted">${escapeHtml(method.id)}</div>
      `;

        method.parameters.forEach((param) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'stack';
            wrapper.innerHTML = `
          <div>
            <label>${escapeHtml(param.label || param.name)} <span class="small muted">(${escapeHtml(param.type)})</span></label>
            <textarea data-param-index="${param.index}" placeholder="Enter a primitive value, or JSON object payload"></textarea>
          </div>
        `;
            el.argsForm.appendChild(wrapper);
        });

        el.invokeBtn.disabled = false;
        el.sampleBtn.disabled = false;
        updatePreview();
    }

    function sampleValueForType(param) {
        const typeName = param.type || '';
        if (typeName === 'au.clef.app.demo.model.Person') {
            return JSON.stringify({
                kind: 'object',
                type: 'au.clef.app.demo.model.Person',
                fields: {
                    name: {kind: 'primitive', value: 'Alice'},
                    age: {kind: 'primitive', value: '25'}
                }
            }, null, 2);
        }
        return defaultValueForParam(param);
    }

    function fillSample() {
        if (!state.selected) return;
        const areas = el.argsForm.querySelectorAll('textarea[data-param-index]');
        areas.forEach((area, idx) => {
            area.value = sampleValueForType(state.selected.parameters[idx]);
        });
        updatePreview();
    }

    function parseArgInput(rawText, param) {
        const text = rawText.trim();
        if (!text) {
            return {kind: 'primitive', value: ''};
        }

        if (text.startsWith('{') || text.startsWith('[')) {
            try {
                return JSON.parse(text);
            } catch (err) {
                throw new Error(`Parameter '${param.name}' contains invalid JSON.`);
            }
        }

        return {kind: 'primitive', value: text};
    }

    function buildRequest() {
        if (!state.selected) return null;

        const method = state.selected;
        const args = [];
        const areas = el.argsForm.querySelectorAll('textarea[data-param-index]');

        areas.forEach((area, idx) => {
            args.push(parseArgInput(area.value, method.parameters[idx]));
        });

        const request = {
            methodId: method.id,
            targetId: method.isStatic ? null : (el.targetId.value.trim() || null),
            args,
        };

        if (method.isStatic) delete request.targetId;
        return request;
    }

    function updatePreview() {
        try {
            const request = buildRequest();
            el.requestPreview.textContent = request ? JSON.stringify(request, null, 2) : '';
        } catch (err) {
            el.requestPreview.textContent = err.message;
        }
    }

    async function loadMethods() {
        const baseUrl = el.baseUrl.value.trim().replace(/\/$/, '');
        const className = el.className.value.trim();
        if (!baseUrl || !className) {
            setStatus('Base URL and class name are required.', 'warn');
            return;
        }

        setStatus('Loading methods...', 'warn');
        state.selected = null;
        renderSelectedMethod();

        try {
            const url = `${baseUrl}/methods/${encodeURIComponent(className)}`;
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const methods = await response.json();
            state.methods = methods;
            renderMethods();
            setStatus(`Loaded ${methods.length} method(s).`, 'ok');
        } catch (err) {
            state.methods = [];
            renderMethods();
            setStatus(`Failed to load methods: ${err.message}`, 'err');
        }
    }

    async function invokeSelected() {
        if (!state.selected) return;

        const baseUrl = el.baseUrl.value.trim().replace(/\/$/, '');
        let request;
        try {
            request = buildRequest();
        } catch (err) {
            el.responseBox.textContent = err.message;
            setStatus('Request is invalid.', 'err');
            return;
        }

        if (!state.selected.isStatic && !request.targetId) {
            el.responseBox.textContent = 'targetId is required for instance methods.';
            setStatus('Missing targetId.', 'err');
            return;
        }

        setStatus('Invoking method...', 'warn');
        el.responseBox.textContent = '';

        try {
            const response = await fetch(`${baseUrl}/invoke`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(request),
            });

            const bodyText = await response.text();
            let parsed;
            try {
                parsed = bodyText ? JSON.parse(bodyText) : null;
            } catch {
                parsed = bodyText;
            }

            if (!response.ok) {
                el.responseBox.textContent = typeof parsed === 'string' ? parsed : JSON.stringify(parsed, null, 2);
                setStatus(`Invocation failed: HTTP ${response.status}`, 'err');
                return;
            }

            el.responseBox.textContent = typeof parsed === 'string' ? parsed : JSON.stringify(parsed, null, 2);
            setStatus('Invocation succeeded.', 'ok');
        } catch (err) {
            el.responseBox.textContent = err.message;
            setStatus(`Invocation failed: ${err.message}`, 'err');
        }
    }

    el.loadBtn.addEventListener('click', loadMethods);
    el.invokeBtn.addEventListener('click', invokeSelected);
    el.sampleBtn.addEventListener('click', fillSample);
    el.argsForm.addEventListener('input', updatePreview);
</script>
</body>
</html>
